<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dorm Glow Minimal</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card-bg: #ffffff;
            --accent: #007aff;
            --danger: #ff3b30;
            --text: #000000;
            --secondary: #8e8e93;
            --border: rgba(0,0,0,0.04);
            /* Мягкое свечение для светлой темы */
            --glow: 0 8px 20px rgba(0,0,0,0.06);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card-bg: #1c1c1e;
                --accent: #0a84ff;
                --danger: #ff453a;
                --text: #ffffff;
                --secondary: #a1a1aa;
                --border: rgba(255,255,255,0.08);
                /* Сияние для темной темы */
                --glow: 0 4px 15px rgba(10, 132, 255, 0.15);
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px 16px 160px 16px;
        }

        h1 { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin: 10px 0 25px 8px; }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            box-shadow: var(--glow);
            will-change: transform; /* Подсказка для GPU */
            transition: transform 0.2s ease;
        }

        .card:active { transform: scale(0.98); }

        .header {
            padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }

        .title { font-weight: 700; font-size: 18px; }

        .empty-toggle {
            display: flex; align-items: center; gap: 6px;
            color: var(--danger); font-size: 13px; font-weight: 600;
        }

        .content {
            display: none;
            padding: 0 20px 20px 20px;
            border-top: 1px solid var(--border);
        }

        .card.open .content { display: block; }

        .row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 0;
            border-bottom: 0.5px solid var(--border);
        }
        .row:last-child { border-bottom: none; }

        .name { font-size: 16px; font-weight: 500; }

        .checks { display: flex; gap: 16px; }
        .checks label { display: flex; align-items: center; gap: 6px; font-size: 19px; }
        
        input[type="checkbox"] { 
            width: 26px; height: 26px; border-radius: 8px;
            accent-color: var(--accent);
        }

        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 16px 20px calc(30px + env(safe-area-inset-bottom));
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 100;
        }

        .btn-main {
            width: 100%; padding: 18px; border-radius: 20px;
            background: var(--accent); color: white;
            border: none; font-size: 17px; font-weight: 700;
        }

        .btn-main:active { opacity: 0.7; }

        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            display: none; align-items: flex-end; z-index: 1000;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }

        .modal {
            background: var(--card-bg); width: 100%;
            border-radius: 32px 32px 0 0;
            padding: 24px 20px calc(40px + env(safe-area-inset-bottom));
        }

        #out {
            background: var(--bg); padding: 15px; border-radius: 20px;
            font-size: 14px; margin-bottom: 20px; max-height: 40vh; overflow-y: auto;
        }

        .grid-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-sec {
            background: var(--bg); color: var(--text); padding: 15px;
            border-radius: 18px; border: none; font-weight: 600; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="auth" style="position:fixed; inset:0; background:var(--bg); z-index:2000; display:flex; align-items:center; justify-content:center;">
    <div style="background:var(--card-bg); padding:30px; border-radius:30px; width:80%; text-align:center;">
        <h2 style="margin-top:0">Вход</h2>
        <input type="password" id="p" style="width:100%; padding:15px; font-size:24px; text-align:center; border-radius:15px; border:1px solid var(--border); background:var(--bg); color:var(--text);" inputmode="numeric" maxlength="4">
        <button class="btn-main" style="margin-top:20px" onclick="login()">Войти</button>
    </div>
</div>

<div id="main" style="display:none">
    <h1>Этаж 6</h1>
    <div id="list"></div>
    <div class="footer">
        <button class="btn-main" onclick="showReport()">Готово</button>
    </div>
</div>

<div id="overlay" onclick="if(event.target==this)this.style.display='none'">
    <div class="modal">
        <div style="width:40px; height:5px; background:var(--secondary); border-radius:10px; margin:-10px auto 20px auto; opacity:0.3;"></div>
        <div id="out"></div>
        <div class="grid-btns">
            <button class="btn-sec" onclick="copyAbs()">Копия отсутсв.</button>
            <button class="btn-sec" onclick="copyWkd()">Копия выход.</button>
        </div>
        <button class="btn-main" style="margin-top:10px;" onclick="location.reload()">Закрыть</button>
    </div>
</div>

<script>
    const roomsData = [
        { r: "634", n: ["Лобачев Е.", "Фролов А.", "Беляев М.", "Дуляев А."] },
        { r: "633", n: ["Гусаков Д.", "Дергунов Я."] },
        { r: "632", n: ["Турсунов С.", "Погосян В."] },
        { r: "631", n: ["Гавриков С.", "Киргиз Н.", "Кисилёв Р.", "Тверянкин А."] },
        { r: "624", n: ["Муратов Н.", "Королёв М.", "Коржов С.", "Хохлов А."] },
        { r: "623", n: ["Бодягин В.", "Иванов Я."] },
        { r: "622", n: ["Обертас Д.", "Мартынов А."] },
        { r: "621", n: ["Меньшов М.", "Ивченков Е.", "Капусткин Р.", "Порочкин Д."] },
        { r: "614", n: ["Ненахов В.", "Распопов Т.", "Распоченюк В.", "Бурименко П."] },
        { r: "613", n: ["Лазарев Ф.", "Коптин С."] },
        { r: "612", n: ["Фомин С.", "Сычев Д."] },
        { r: "611", n: ["Скрябин С.", "Колесников И.", "Захариков Д.", "Поповкин А."] },
        { r: "600", n: ["Грязнов С.", "Андрианов Э."] }
    ];

    let state = JSON.parse(localStorage.getItem('dorm_final_v1')) || {};
    let lastAbs = "", lastWkd = "";

    function login() {
        if(document.getElementById('p').value === "9564") {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            render();
        }
    }

    function save(id, val) {
        state[id] = val;
        localStorage.setItem('dorm_final_v1', JSON.stringify(state));
    }

    function render() {
        const list = document.getElementById('list');
        list.innerHTML = '';
        roomsData.forEach(room => {
            const isE = state[`e_${room.r}`] || false;
            const card = document.createElement('div');
            card.className = 'card';
            if(isE) card.style.opacity = '0.5';

            let rows = '';
            room.n.forEach(name => {
                const idP = `p_${room.r}_${name}`;
                const idW = `w_${room.r}_${name}`;
                const checkP = state[idP] !== undefined ? state[idP] : true;
                const checkW = state[idW] || false;

                rows += `
                <div class="row">
                    <span class="name">${name}</span>
                    <div class="checks">
                        <label>🏠<input type="checkbox" onchange="save('${idP}', this.checked)" ${checkP?'checked':''} ${isE?'disabled':''}></label>
                        <label>📅<input type="checkbox" onchange="save('${idW}', this.checked)" ${checkW?'checked':''}></label>
                    </div>
                </div>`;
            });

            card.innerHTML = `
                <div class="header" onclick="this.parentElement.classList.toggle('open')">
                    <span class="title">Комната ${room.r}</span>
                    <label class="empty-toggle" onclick="event.stopPropagation()">
                        Пусто <input type="checkbox" onchange="save('e_${room.r}', this.checked);render()" ${isE?'checked':''}>
                    </label>
                </div>
                <div class="content">${rows}</div>
            `;
            list.appendChild(card);
        });
    }

    function showReport() {
        let present = 0, abs = [], wkd = [];
        roomsData.forEach(r => {
            if(state[`e_${r.r}`]) abs.push(`• В ${r.r} никого нет`);
            else {
                let localAbs = [];
                r.n.forEach(n => {
                    if(state[`p_${r.r}_${n}`] !== false) present++;
                    else localAbs.push(n.split(' ')[0]);
                });
                if(localAbs.length) abs.push(`• ${localAbs.join(', ')} (${r.r})`);
            }
            r.n.forEach(n => { if(state[`w_${r.r}_${n}`]) wkd.push(`${n.split(' ')[0]} (${r.r})`); });
        });

        lastAbs = abs.join('\n');
        lastWkd = wkd.join(', ');

        document.getElementById('out').innerText = `ИТОГ: ${present} чел.\n\nОТСУТСТВУЮТ:\n${lastAbs || 'Все на месте'}\n\nНА ВЫХОДНЫЕ:\n${lastWkd || 'Никого'}`;
        document.getElementById('overlay').style.display = 'flex';
    }

    function copyAbs() {
        navigator.clipboard.writeText(lastAbs || "Все на месте");
        alert('Отсутствующие скопированы!');
    }

    function copyWkd() {
        navigator.clipboard.writeText(lastWkd || "Никого");
        alert('Выходные скопированы!');
    }
</script>
</body>
</html>
