<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Учет этажа PRO</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --card: #ffffff;
            --accent: #007aff;
            --danger: #ff3b30;
            --success: #34c759;
            --text: #1c1c1e;
            --secondary: #8e8e93;
            --border: #e5e5ea;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1c1c1e;
                --accent: #0a84ff;
                --danger: #ff453a;
                --success: #30d158;
                --text: #ffffff;
                --secondary: #98989d;
                --border: #38383a;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px 20px 120px 20px;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* Анимация появления контента */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animated { animation: fadeIn 0.4s ease forwards; }

        h2 { font-weight: 700; font-size: 28px; margin-bottom: 20px; }

        /* Вход */
        #authScreen {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pin-input {
            font-size: 32px; padding: 16px; width: 160px; text-align: center;
            border: 2px solid var(--border); border-radius: 16px; margin: 24px 0;
            letter-spacing: 12px; background: var(--card); color: var(--text); outline: none;
        }

        /* Комнаты */
        .room-block { 
            background: var(--card); margin-bottom: 14px; 
            border-radius: 18px; border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .room-block.empty-room { 
            border-color: var(--danger); 
            background: rgba(255, 59, 48, 0.05);
            opacity: 0.8;
        }

        .room-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .room-info { display: flex; align-items: center; gap: 12px; cursor: pointer; flex-grow: 1; }
        .room-title { font-weight: 600; font-size: 17px; }
        
        #arrow { transition: transform 0.3s ease; }

        .empty-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--danger); font-weight: 600; }
        .empty-toggle input { width: 22px; height: 22px; accent-color: var(--danger); transition: transform 0.2s; }
        .empty-toggle input:active { transform: scale(1.3); }

        .room-content { 
            max-height: 0; opacity: 0; transition: all 0.3s ease; padding: 0 20px;
        }
        .room-content.open { max-height: 500px; opacity: 1; padding: 0 20px 10px 20px; border-top: 1px solid var(--border); }

        .resident { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 16px 0; border-bottom: 1px solid var(--border); 
        }
        .resident:last-child { border-bottom: none; }

        /* Кнопки и инпуты */
        .check-group { display: flex; gap: 20px; }
        .check-group label { display: flex; flex-direction: column; align-items: center; font-size: 11px; color: var(--secondary); gap: 4px; }
        input[type="checkbox"] { width: 26px; height: 26px; border-radius: 8px; accent-color: var(--accent); transition: transform 0.1s; }
        input[type="checkbox"]:active { transform: scale(1.2); }

        .main-controls { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(var(--bg), 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 20px 20px 40px 20px; border-top: 1px solid var(--border); z-index: 10;
        }
        button { transition: transform 0.1s active, opacity 0.2s; cursor: pointer; }
        button:active { transform: scale(0.96); opacity: 0.9; }

        .btn-main { 
            width: 100%; background: var(--accent); color: white; padding: 18px; 
            border-radius: 16px; border: none; font-size: 17px; font-weight: 600; 
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.2);
        }

        /* Модалка отчета */
        #reportScreen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 99999; display: none; flex-direction: column; justify-content: flex-end;
        }
        .report-modal {
            background: var(--card); border-radius: 30px 30px 0 0; padding: 25px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }
        #reportScreen.active .report-modal { transform: translateY(0); }

        .report-text { 
            font-size: 16px; white-space: pre-wrap; background: var(--bg); 
            padding: 16px; border-radius: 16px; margin-bottom: 20px; max-height: 40vh; overflow-y: auto;
        }
        
        .copy-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .btn-copy-sub { background: var(--card); border: 1px solid var(--accent); color: var(--accent); padding: 14px; border-radius: 12px; font-weight: 600; font-size: 14px; }
        .btn-copy-main { background: var(--accent); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 600; font-size: 14px; }
        .btn-close { width: 100%; background: var(--border); color: var(--text); padding: 14px; border-radius: 12px; border: none; margin-top: 5px; font-weight: 600; }

        #mainContent { display: none; }
    </style>
</head>
<body>

    <div id="authScreen">
        <h2 style="margin-bottom:0">🔐 Вход</h2>
        <input type="password" id="pinInput" class="pin-input" inputmode="numeric" maxlength="4" placeholder="••••">
        <button class="btn-main" style="width:160px" onclick="checkPin()">Войти</button>
    </div>

    <div id="mainContent" class="animated">
        <h2>Численность</h2>
        <div id="app"></div>
        <div class="main-controls">
            <button class="btn-main" onclick="openReport()">Готово</button>
        </div>
    </div>

    <div id="reportScreen" onclick="if(event.target==this)closeReport()">
        <div class="report-modal">
            <h3 style="margin-top:0; text-align:center">Отчет сформирован</h3>
            <div id="reportOutput" class="report-text"></div>
            
            <div class="copy-group">
                <button class="btn-copy-main" onclick="copyPart('main')">Копировать итог</button>
                <button class="btn-copy-sub" onclick="copyPart('weekend')">Копировать выходные</button>
            </div>
            <button class="btn-close" onclick="closeReport()">Назад</button>
            <button style="width:100%; color:var(--danger); background:none; border:none; margin-top:15px; font-size:13px" onclick="resetAll()">Сбросить всё и начать новый обход</button>
        </div>
    </div>

<script>
    const SECRET_PIN = "9564";
    const data = [
        { room: "634", names: ["Лобачев Е.", "Фролов А.", "Беляев М.", "Дуляев А."] },
        { room: "633", names: ["Гусаков Д.", "Дергунов Я."] },
        { room: "632", names: ["Турсунов С.", "Погосян В."] },
        { room: "631", names: ["Гавриков С.", "Киргиз Н.", "Кисилёв Р.", "Тверянкин А."] },
        { room: "624", names: ["Муратов Н.", "Королёв М.", "Коржов С.", "Хохлов А."] },
        { room: "623", names: ["Бодягин В.", "Иванов Я."] },
        { room: "622", names: ["Обертас Д.", "Мартынов А."] },
        { room: "621", names: ["Меньшов М.", "Ивченков Е.", "Капусткин Р.", "Порочкин Д."] },
        { room: "614", names: ["Ненахов В.", "Распопов Т.", "Распоченюк В.", "Бурименко П."] },
        { room: "613", names: ["Лазарев Ф.", "Коптин С."] },
        { room: "612", names: ["Фомин С.", "Сычев Д."] },
        { room: "611", names: ["Скрябин С.", "Колесников И.", "Захариков Д.", "Поповкин А."] },
        { room: "600", names: ["Грязнов С.", "Андрианов Э."] }
    ];

    const storageKey = 'dorm_v6';
    let savedData = JSON.parse(localStorage.getItem(storageKey)) || {};
    let lastMainReport = "";
    let lastWeekendReport = "";

    if (localStorage.getItem('dorm_auth') === 'true') unlockApp();

    function checkPin() {
        if (document.getElementById('pinInput').value === SECRET_PIN) {
            localStorage.setItem('dorm_auth', 'true');
            unlockApp();
        } else alert('Неверный код');
    }

    function unlockApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        render();
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        data.forEach(item => {
            const isEmpty = savedData[`empty_${item.room}`] || false;
            const roomDiv = document.createElement('div');
            roomDiv.className = `room-block ${isEmpty ? 'empty-room' : ''}`;
            
            let resHtml = '';
            item.names.forEach(name => {
                const idP = `p_${item.room}_${name}`, idW = `w_${item.room}_${name}`;
                const isP = isEmpty ? false : (savedData[idP] !== undefined ? savedData[idP] : true);
                const isW = savedData[idW] || false;

                resHtml += `
                    <div class="resident">
                        <span class="res-name" style="${isEmpty ? 'color:var(--secondary)' : ''}">${name}</span>
                        <div class="check-group">
                            <label><input type="checkbox" onchange="save('${idP}', this.checked)" ${isP?'checked':''} ${isEmpty?'disabled':''}>🏠</label>
                            <label><input type="checkbox" onchange="save('${idW}', this.checked)" ${isW?'checked':''}>📅</label>
                        </div>
                    </div>`;
            });

            roomDiv.innerHTML = `
                <div class="room-header">
                    <div class="room-info" onclick="toggleRoom(this)">
                        <span class="room-title">Комната ${item.room}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <label class="empty-toggle">
                        <span>Пусто</span>
                        <input type="checkbox" onchange="setEmpty('${item.room}', this.checked)" ${isEmpty?'checked':''}>
                    </label>
                </div>
                <div class="room-content">${resHtml}</div>`;
            app.appendChild(roomDiv);
        });
    }

    function toggleRoom(el) {
        const content = el.parentElement.nextElementSibling;
        const arrow = el.querySelector('.arrow');
        content.classList.toggle('open');
        arrow.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function setEmpty(room, val) {
        savedData[`empty_${room}`] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
        render();
    }

    function save(id, val) {
        savedData[id] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
    }

    function openReport() {
        let totalP = 0, missing = [], weekenders = [];

        data.forEach(g => {
            if (savedData[`empty_${g.room}`]) {
                missing.push(`• В ${g.room} никого нет`);
            } else {
                let abs = [];
                g.names.forEach(n => {
                    if (savedData[`p_${g.room}_${n}`] !== false) totalP++;
                    else abs.push(n.split(' ')[0]);
                });
                if (abs.length) missing.push(`• ${abs.join(', ')} (${g.room})`);
            }
            g.names.forEach(n => {
                if (savedData[`w_${g.room}_${n}`]) weekenders.push(`${n.split(' ')[0]} (${g.room})`);
            });
        });

        lastMainReport = `ИТОГ: ${totalP} чел.\n\nОТСУТСТВУЮТ:\n${missing.length ? missing.join('\n') : 'Все на месте'}`;
        lastWeekendReport = weekenders.length ? `НА ВЫХОДНЫЕ:\n${weekenders.join(', ')}` : "На выходные никого нет";

        document.getElementById('reportOutput').innerText = lastMainReport + (weekenders.length ? `\n\n${lastWeekendReport}` : "");
        const screen = document.getElementById('reportScreen');
        screen.style.display = 'flex';
        setTimeout(() => screen.classList.add('active'), 10);
    }

    function copyPart(type) {
        const text = (type === 'main') ? lastMainReport : lastWeekendReport;
        navigator.clipboard.writeText(text).then(() => {
            alert('Скопировано!');
        });
    }

    function closeReport() {
        const screen = document.getElementById('reportScreen');
        screen.classList.remove('active');
        setTimeout(() => screen.style.display = 'none', 400);
    }

    function resetAll() {
        if (confirm("Удалить все отметки?")) {
            localStorage.removeItem(storageKey);
            location.reload();
        }
    }
</script>
</body>
</html>
