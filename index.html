<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Учет этажа - Max Performance</title>
    <style>
        :root {
            --bg: #f2f2f7;
            /* Имитируем стекло без тяжелого фильтра blur */
            --glass: #ffffff; 
            --glass-border: rgba(0, 0, 0, 0.05);
            --glow: rgba(0, 0, 0, 0.04); 
            --accent: #007aff;
            --danger: #ff3b30;
            --text: #1c1c1e;
            --secondary: #8e8e93;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                /* Цвет карточки в темной теме */
                --glass: #1c1c1e; 
                --glass-border: rgba(255, 255, 255, 0.08);
                --glow: rgba(255, 255, 255, 0.03); 
                --accent: #0a84ff;
                --danger: #ff453a;
                --text: #ffffff;
                --secondary: #98989d;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; 
            padding: 15px 14px calc(110px + env(safe-area-inset-bottom)) 14px;
            display: flex; flex-direction: column; align-items: center;
        }

        #mainContent { width: 100%; max-width: 480px; display: none; }
        #app { width: 100%; }

        /* Облегченная панель: без тяжелых blur-фильтров */
        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 6px 20px var(--glow), 0 2px 8px rgba(0,0,0,0.05);
            transform: translateZ(0); /* Включает аппаратное ускорение слоя */
        }

        .room-block { 
            margin-bottom: 14px; 
            width: 100%;
        }
        
        .room-header { 
            padding: 10px 16px; 
            display: flex; justify-content: space-between; align-items: center; 
            cursor: pointer;
        }
        
        .room-title { font-weight: 700; font-size: 16px; letter-spacing: -0.3px; }
        .arrow { transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1); color: var(--secondary); font-size: 9px; }

        .empty-toggle { 
            display: flex; align-items: center; gap: 6px; 
            color: var(--danger); font-weight: 600; font-size: 12px;
        }
        .empty-toggle input { width: 20px; height: 20px; accent-color: var(--danger); }

        /* НОВЫЙ ПОДХОД К АНИМАЦИИ ВЫСОТЫ */
        .room-content-wrapper {
            height: 0px; /* Жесткий ноль */
            overflow: hidden;
            transition: height 0.35s cubic-bezier(0.33, 1, 0.68, 1);
            will-change: height; /* Заранее готовим видеокарту к анимации */
        }

        /* Сам контент внутри враппера */
        .room-content { 
            padding: 0 16px 12px 16px;
            opacity: 0;
            transition: opacity 0.2s ease-out;
            border-top: 1px solid transparent;
        }
        
        .room-content-wrapper.open .room-content { 
            opacity: 1; 
            border-top-color: var(--glass-border); 
            padding-top: 8px;
        }

        .resident { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 6px 0; 
            border-bottom: 0.5px solid var(--glass-border); 
        }
        .resident:last-child { border-bottom: none; }
        .res-name { font-weight: 500; font-size: 15px; }

        .check-group { display: flex; gap: 10px; }
        .check-group label { display: flex; align-items: center; gap: 4px; font-size: 16px; }
        input[type="checkbox"] { width: 24px; height: 24px; border-radius: 8px; accent-color: var(--accent); }

        /* Экран входа */
        #authScreen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; inset: 0; background: var(--bg); z-index: 9999; height: 100dvh;
        }
        .auth-card { width: 280px; padding: 30px; text-align: center; }
        
        .pin-field {
            width: 100%; font-size: 28px; background: rgba(100,100,100,0.05); 
            border: 2px solid var(--accent); border-radius: 16px; padding: 12px; 
            color: var(--text); text-align: center; margin: 20px 0; outline: none;
            letter-spacing: 6px;
        }

        /* Панель кнопок */
        .main-controls { 
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: center;
            background: var(--glass);
            /* Оставили blur только для нижней панели, так как она не меняет размер */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 16px calc(15px + env(safe-area-inset-bottom)) 16px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .btn-main { 
            width: 100%; max-width: 400px; background: var(--accent); color: white; padding: 16px; 
            border-radius: 18px; border: none; font-size: 17px; font-weight: 700; 
            box-shadow: 0 6px 15px rgba(0, 122, 255, 0.25);
        }
        .btn-main:active { opacity: 0.8; }

        h2 { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin: 10px 0 20px 5px; }
        
        #reportScreen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); 
            z-index: 99999; display: none; flex-direction: column; justify-content: flex-end;
        }
        .report-modal {
            background: var(--glass);
            border-radius: 30px 30px 0 0; 
            padding: 25px 20px calc(25px + env(safe-area-inset-bottom)) 20px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.33, 1, 0.68, 1);
            width: 100%; max-width: 500px; align-self: center;
        }
        #reportScreen.active .report-modal { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="glass-panel auth-card">
            <h3 style="margin:0 0 10px 0;">🔒 Вход</h3>
            <input type="password" id="pinInput" class="pin-field" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="btn-main" onclick="checkPin()">Войти</button>
        </div>
    </div>

    <div id="mainContent">
        <h2>Численность</h2>
        <div id="app"></div>
        <div class="main-controls">
            <button class="btn-main" onclick="openReport()">Готово</button>
        </div>
    </div>

    <div id="reportScreen" onclick="if(event.target==this)closeReport()">
        <div class="report-modal">
            <div style="width: 35px; height: 5px; background: var(--secondary); border-radius: 10px; margin: -10px auto 20px auto; opacity: 0.3;"></div>
            <div id="reportOutput" style="font-size:15px; background:rgba(100,100,100,0.1); padding:15px; border-radius:15px; margin-bottom:15px; white-space:pre-wrap;"></div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;">
                <button class="btn-main" style="padding:12px; font-size:14px;" onclick="copyPart('main')">Копия Итога</button>
                <button class="btn-main" style="background:transparent; border:2px solid var(--accent); color:var(--accent); box-shadow:none; padding:12px; font-size:14px;" onclick="copyPart('weekend')">Выходные</button>
            </div>
            <button class="btn-main" style="background: var(--bg); color: var(--text); box-shadow: none;" onclick="closeReport()">Закрыть</button>
            <button style="width: 100%; background: none; border: none; color: var(--danger); margin-top: 15px; font-weight: 600; font-size: 13px;" onclick="resetAll()">Сбросить всё</button>
        </div>
    </div>

<script>
    const SECRET_PIN = "9564";
    const data = [
        { room: "634", names: ["Лобачев Е.", "Фролов А.", "Беляев М.", "Дуляев А."] },
        { room: "633", names: ["Гусаков Д.", "Дергунов Я."] },
        { room: "632", names: ["Турсунов С.", "Погосян В."] },
        { room: "631", names: ["Гавриков С.", "Киргиз Н.", "Кисилёв Р.", "Тверянкин А."] },
        { room: "624", names: ["Муратов Н.", "Королёв М.", "Коржов С.", "Хохлов А."] },
        { room: "623", names: ["Бодягин В.", "Иванов Я."] },
        { room: "622", names: ["Обертас Д.", "Мартынов А."] },
        { room: "621", names: ["Меньшов М.", "Ивченков Е.", "Капусткин Р.", "Порочкин Д."] },
        { room: "614", names: ["Ненахов В.", "Распопов Т.", "Распоченюк В.", "Бурименко П."] },
        { room: "613", names: ["Лазарев Ф.", "Коптин С."] },
        { room: "612", names: ["Фомин С.", "Сычев Д."] },
        { room: "611", names: ["Скрябин С.", "Колесников И.", "Захариков Д.", "Поповкин А."] },
        { room: "600", names: ["Грязнов С.", "Андрианов Э."] }
    ];

    const storageKey = 'dorm_super_smooth';
    let savedData = JSON.parse(localStorage.getItem(storageKey)) || {};
    let rMain = "", rWeekend = "";

    if (localStorage.getItem('dorm_auth_smooth') === 'true') unlockApp();

    function checkPin() {
        if (document.getElementById('pinInput').value === SECRET_PIN) {
            localStorage.setItem('dorm_auth_smooth', 'true');
            unlockApp();
        } else {
            alert('❌');
            document.getElementById('pinInput').value = '';
        }
    }

    function unlockApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        render();
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        data.forEach(item => {
            const isEmpty = savedData[`empty_${item.room}`] || false;
            const roomDiv = document.createElement('div');
            roomDiv.className = `room-block glass-panel`;
            if(isEmpty) roomDiv.style.opacity = "0.5";
            
            let resHtml = '';
            item.names.forEach(name => {
                const idP = `p_${item.room}_${name}`, idW = `w_${item.room}_${name}`;
                const isP = isEmpty ? false : (savedData[idP] !== undefined ? savedData[idP] : true);
                const isW = savedData[idW] || false;

                resHtml += `
                    <div class="resident">
                        <span class="res-name" style="${isEmpty ? 'opacity:0.3' : ''}">${name}</span>
                        <div class="check-group">
                            <label><input type="checkbox" onchange="save('${idP}', this.checked)" ${isP?'checked':''} ${isEmpty?'disabled':''}>🏠</label>
                            <label><input type="checkbox" onchange="save('${idW}', this.checked)" ${isW?'checked':''}>📅</label>
                        </div>
                    </div>`;
            });

            roomDiv.innerHTML = `
                <div class="room-header" onclick="toggleRoom(this)">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span class="room-title">Комната ${item.room}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <label class="empty-toggle" onclick="event.stopPropagation()">
                        <span>Пусто</span>
                        <input type="checkbox" onchange="setEmpty('${item.room}', this.checked)" ${isEmpty?'checked':''}>
                    </label>
                </div>
                <div class="room-content-wrapper">
                    <div class="room-content">${resHtml}</div>
                </div>`;
            app.appendChild(roomDiv);
        });
    }

    // НОВАЯ JS-АНИМАЦИЯ: Вычисляет высоту до пикселя для идеальной плавности
    function toggleRoom(header) {
        const wrapper = header.nextElementSibling;
        const arrow = header.querySelector('.arrow');
        const content = wrapper.querySelector('.room-content');
        
        if (!wrapper.classList.contains('open')) {
            // Открываем
            wrapper.classList.add('open');
            let contentHeight = content.offsetHeight; 
            wrapper.style.height = contentHeight + 'px';
            arrow.style.transform = 'rotate(180deg)';
            
            // Сбрасываем жесткую высоту после окончания анимации
            setTimeout(() => { 
                if (wrapper.classList.contains('open')) wrapper.style.height = 'auto'; 
            }, 350);

        } else {
            // Закрываем
            let contentHeight = content.offsetHeight;
            wrapper.style.height = contentHeight + 'px'; // Фиксируем высоту
            wrapper.offsetHeight; // Принудительно заставляем браузер обновить кадр
            
            wrapper.style.height = '0px'; // Сворачиваем в 0
            wrapper.classList.remove('open');
            arrow.style.transform = 'rotate(0deg)';
        }
    }

    function setEmpty(room, val) {
        savedData[`empty_${room}`] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
        render();
    }

    function save(id, val) {
        savedData[id] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
    }

    function openReport() {
        let total = 0, absent = [], wkd = [];
        data.forEach(g => {
            if (savedData[`empty_${g.room}`]) absent.push(`• В ${g.room} никого нет`);
            else {
                let rAbs = [];
                g.names.forEach(n => {
                    if (savedData[`p_${g.room}_${n}`] !== false) total++;
                    else rAbs.push(n.split(' ')[0]);
                });
                if (rAbs.length) absent.push(`• ${rAbs.join(', ')} (${g.room})`);
            }
            g.names.forEach(n => { if (savedData[`w_${g.room}_${n}`]) wkd.push(`${n.split(' ')[0]} (${g.room})`); });
        });

        rMain = `ИТОГ: ${total} чел.\n\nОТСУТСТВУЮТ:\n${absent.length ? absent.join('\n') : 'Все на месте'}`;
        rWeekend = wkd.length ? `НА ВЫХОДНЫЕ:\n${wkd.join(', ')}` : "Никого нет";

        document.getElementById('reportOutput').innerText = rMain + (wkd.length ? `\n\n${rWeekend}` : "");
        const s = document.getElementById('reportScreen');
        s.style.display = 'flex';
        setTimeout(() => s.classList.add('active'), 10);
    }

    function copyPart(t) {
        const text = (t === 'main') ? rMain : rWeekend;
        const clean = text.replace(/[🏠📅•]/g, '').trim();
        navigator.clipboard.writeText(clean).then(() => alert('Скопировано!'));
    }

    function closeReport() {
        const s = document.getElementById('reportScreen');
        s.classList.remove('active');
        setTimeout(() => s.style.display = 'none', 300);
    }

    function resetAll() {
        if (confirm("Точно удалить всё?")) { localStorage.removeItem(storageKey); location.reload(); }
    }
</script>
</body>
</html>
