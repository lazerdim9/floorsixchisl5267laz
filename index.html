<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Учет этажа PRO</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glow: rgba(255, 255, 255, 0.3);
            --accent: #007aff;
            --danger: #ff3b30;
            --text: #1c1c1e;
            --secondary: #8e8e93;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --glass: rgba(28, 28, 30, 0.8);
                --glass-border: rgba(255, 255, 255, 0.12);
                --glow: rgba(255, 255, 255, 0.08); /* Рассеянное свечение */
                --accent: #0a84ff;
                --danger: #ff453a;
                --text: #ffffff;
                --secondary: #98989d;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; 
            padding: 20px 20px calc(130px + env(safe-area-inset-bottom)) 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* Оптимизированный Liquid Glass с мягким свечением */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 22px;
            box-shadow: 0 0 15px 2px var(--glow), 0 10px 30px rgba(0,0,0,0.1);
            transform: translateZ(0);
            contain: paint; /* Оптимизация отрисовки теней */
        }

        .room-block { margin-bottom: 16px; transition: transform 0.2s ease; }
        .room-block.empty-room { opacity: 0.5; transform: scale(0.97); box-shadow: none; border-color: var(--danger); }

        .room-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .room-title { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
        .arrow { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); color: var(--secondary); font-size: 10px; }

        .empty-toggle { display: flex; align-items: center; gap: 8px; color: var(--danger); font-weight: 600; font-size: 13px; }
        .empty-toggle input { width: 22px; height: 22px; accent-color: var(--danger); }

        /* ИДЕАЛЬНО ПЛАВНАЯ АНИМАЦИЯ (CSS Grid Trick) */
        .room-content-wrapper {
            display: grid;
            grid-template-rows: 0fr;
            transition: grid-template-rows 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .room-content-wrapper.open { grid-template-rows: 1fr; }

        .room-content { 
            min-height: 0; 
            opacity: 0;
            transform: translateY(-5px);
            transition: opacity 0.3s ease, transform 0.3s ease;
            padding: 0 20px 20px 20px;
        }
        .room-content-wrapper.open .room-content { opacity: 1; transform: translateY(0); border-top: 1px solid var(--glass-border); padding-top: 10px; }

        .resident { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid var(--glass-border); }
        .resident:last-child { border-bottom: none; }

        /* Чекбоксы в ряд */
        .check-group { display: flex; gap: 14px; }
        .check-group label { display: flex; align-items: center; gap: 6px; font-size: 18px; }
        input[type="checkbox"] { width: 24px; height: 24px; border-radius: 8px; accent-color: var(--accent); }

        /* Исправленный экран входа */
        #authScreen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            height: 100dvh; /* Используем dynamic vh для фикса "съезда" кнопок */
        }
        .auth-card { width: 290px; padding: 35px 25px; text-align: center; }

        .pin-field {
            width: 100%; font-size: 28px; background: rgba(255,255,255,0.05); 
            border: 2px solid var(--accent); border-radius: 18px; padding: 12px; 
            color: var(--text); text-align: center; margin: 20px 0; outline: none;
        }

        /* Нижняя панель управления */
        .main-controls { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            padding: 15px 20px calc(20px + env(safe-area-inset-bottom)) 20px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .btn-main { 
            width: 100%; background: var(--accent); color: white; padding: 18px; 
            border-radius: 20px; border: none; font-size: 17px; font-weight: 700; 
            box-shadow: 0 8px 20px rgba(0, 122, 255, 0.2);
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        /* Отчет (модалка) */
        #reportScreen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px); z-index: 99999; 
            display: none; flex-direction: column; justify-content: flex-end;
        }
        .report-modal {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px 35px 0 0; 
            padding: 30px 25px calc(30px + env(safe-area-inset-bottom)) 25px;
            transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        #reportScreen.active .report-modal { transform: translateY(0); }

        .report-box { 
            font-size: 16px; background: rgba(255,255,255,0.05); padding: 20px; 
            border-radius: 20px; margin-bottom: 20px; border: 1px solid var(--glass-border); white-space: pre-wrap;
        }
        
        .copy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-copy { padding: 16px; border-radius: 16px; font-weight: 700; border: none; font-size: 14px; }
        .copy-blue { background: var(--accent); color: white; }
        .copy-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        #mainContent { display: none; }
        h2 { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="glass-panel auth-card">
            <h2 style="font-size: 24px; margin: 0;">🔒 Вход</h2>
            <input type="password" id="pinInput" class="pin-field" inputmode="numeric" maxlength="4" placeholder="••••">
            <button class="btn-main" onclick="checkPin()">Войти</button>
        </div>
    </div>

    <div id="mainContent">
        <h2>Численность</h2>
        <div id="app"></div>
        <div class="main-controls">
            <button class="btn-main" onclick="openReport()">Готово</button>
        </div>
    </div>

    <div id="reportScreen" onclick="if(event.target==this)closeReport()">
        <div class="report-modal">
            <div style="width: 40px; height: 5px; background: var(--secondary); border-radius: 5px; margin: -15px auto 20px auto; opacity: 0.3;"></div>
            <h3 style="text-align:center; margin-bottom: 20px;">Отчет сформирован</h3>
            <div id="reportOutput" class="report-box"></div>
            <div class="copy-row">
                <button class="btn-copy copy-blue" onclick="copyPart('main')">Итог</button>
                <button class="btn-copy copy-outline" onclick="copyPart('weekend')">Выходные</button>
            </div>
            <button class="btn-main" style="background: var(--bg); color: var(--text); box-shadow: none;" onclick="closeReport()">Закрыть</button>
            <button style="width: 100%; background: none; border: none; color: var(--danger); margin-top: 20px; font-weight: 600;" onclick="resetAll()">Сбросить всё</button>
        </div>
    </div>

<script>
    const SECRET_PIN = "9564";
    const data = [
        { room: "634", names: ["Лобачев Е.", "Фролов А.", "Беляев М.", "Дуляев А."] },
        { room: "633", names: ["Гусаков Д.", "Дергунов Я."] },
        { room: "632", names: ["Турсунов С.", "Погосян В."] },
        { room: "631", names: ["Гавриков С.", "Киргиз Н.", "Кисилёв Р.", "Тверянкин А."] },
        { room: "624", names: ["Муратов Н.", "Королёв М.", "Коржов С.", "Хохлов А."] },
        { room: "623", names: ["Бодягин В.", "Иванов Я."] },
        { room: "622", names: ["Обертас Д.", "Мартынов А."] },
        { room: "621", names: ["Меньшов М.", "Ивченков Е.", "Капусткин Р.", "Порочкин Д."] },
        { room: "614", names: ["Ненахов В.", "Распопов Т.", "Распоченюк В.", "Бурименко П."] },
        { room: "613", names: ["Лазарев Ф.", "Коптин С."] },
        { room: "612", names: ["Фомин С.", "Сычев Д."] },
        { room: "611", names: ["Скрябин С.", "Колесников И.", "Захариков Д.", "Поповкин А."] },
        { room: "600", names: ["Грязнов С.", "Андрианов Э."] }
    ];

    const storageKey = 'dorm_v_final';
    let savedData = JSON.parse(localStorage.getItem(storageKey)) || {};
    let rMain = "", rWeekend = "";

    if (localStorage.getItem('dorm_auth') === 'true') unlockApp();

    function checkPin() {
        if (document.getElementById('pinInput').value === SECRET_PIN) {
            localStorage.setItem('dorm_auth', 'true');
            unlockApp();
        } else {
            alert('Неверный код');
            document.getElementById('pinInput').value = '';
        }
    }

    function unlockApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        render();
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        data.forEach(item => {
            const isEmpty = savedData[`empty_${item.room}`] || false;
            const roomDiv = document.createElement('div');
            roomDiv.className = `room-block glass-panel ${isEmpty ? 'empty-room' : ''}`;
            
            let resHtml = '';
            item.names.forEach(name => {
                const idP = `p_${item.room}_${name}`, idW = `w_${item.room}_${name}`;
                const isP = isEmpty ? false : (savedData[idP] !== undefined ? savedData[idP] : true);
                const isW = savedData[idW] || false;

                resHtml += `
                    <div class="resident">
                        <span class="res-name">${name}</span>
                        <div class="check-group">
                            <label><input type="checkbox" onchange="save('${idP}', this.checked)" ${isP?'checked':''} ${isEmpty?'disabled':''}>🏠</label>
                            <label><input type="checkbox" onchange="save('${idW}', this.checked)" ${isW?'checked':''}>📅</label>
                        </div>
                    </div>`;
            });

            roomDiv.innerHTML = `
                <div class="room-header" onclick="toggleRoom(this)">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <span class="room-title">Комната ${item.room}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <label class="empty-toggle" onclick="event.stopPropagation()">
                        <span>Пусто</span>
                        <input type="checkbox" onchange="setEmpty('${item.room}', this.checked)" ${isEmpty?'checked':''}>
                    </label>
                </div>
                <div class="room-content-wrapper">
                    <div class="room-content">${resHtml}</div>
                </div>`;
            app.appendChild(roomDiv);
        });
    }

    function toggleRoom(header) {
        const wrapper = header.nextElementSibling;
        const arrow = header.querySelector('.arrow');
        const isOpen = wrapper.classList.toggle('open');
        arrow.style.transform = isOpen ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function setEmpty(room, val) {
        savedData[`empty_${room}`] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
        render();
    }

    function save(id, val) {
        savedData[id] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
    }

    function openReport() {
        let total = 0, absent = [], wkd = [];
        data.forEach(g => {
            if (savedData[`empty_${g.room}`]) absent.push(`• В ${g.room} никого нет`);
            else {
                let rAbs = [];
                g.names.forEach(n => {
                    if (savedData[`p_${g.room}_${n}`] !== false) total++;
                    else rAbs.push(n.split(' ')[0]);
                });
                if (rAbs.length) absent.push(`• ${rAbs.join(', ')} (${g.room})`);
            }
            g.names.forEach(n => { if (savedData[`w_${g.room}_${n}`]) wkd.push(`${n.split(' ')[0]} (${g.room})`); });
        });

        rMain = `ИТОГ: ${total} чел.\n\nОТСУТСТВУЮТ:\n${absent.length ? absent.join('\n') : 'Все на месте'}`;
        rWeekend = wkd.length ? `НА ВЫХОДНЫЕ:\n${wkd.join(', ')}` : "Никого нет";

        document.getElementById('reportOutput').innerText = rMain + (wkd.length ? `\n\n${rWeekend}` : "");
        const s = document.getElementById('reportScreen');
        s.style.display = 'flex';
        setTimeout(() => s.classList.add('active'), 10);
    }

    function copyPart(t) {
        const text = (t === 'main') ? rMain : rWeekend;
        const clean = text.replace(/[🏠📅•]/g, '').trim();
        navigator.clipboard.writeText(clean).then(() => {
            alert('Скопировано! ✅');
        });
    }

    function closeReport() {
        const s = document.getElementById('reportScreen');
        s.classList.remove('active');
        setTimeout(() => s.style.display = 'none', 450);
    }

    function resetAll() {
        if (confirm("Сбросить все данные?")) { localStorage.clear(); location.reload(); }
    }
</script>
</body>
</html>
