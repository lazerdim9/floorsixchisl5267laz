<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Учет этажа Liquid</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --accent: #007aff;
            --danger: #ff3b30;
            --text: #1c1c1e;
            --secondary: #8e8e93;
            --card-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --glass: rgba(28, 28, 30, 0.75);
                --glass-border: rgba(255, 255, 255, 0.1);
                --accent: #0a84ff;
                --danger: #ff453a;
                --text: #ffffff;
                --secondary: #98989d;
            }
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; 
            /* Добавляем нижний отступ, чтобы контент не перекрывался панелью */
            padding: 20px 20px calc(120px + env(safe-area-inset-bottom)) 20px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Эффект Liquid Glass для блоков */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: var(--card-shadow);
        }

        .room-block { margin-bottom: 14px; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .room-block.empty-room { border-color: var(--danger); opacity: 0.6; transform: scale(0.98); }

        .room-header { padding: 18px 20px; display: flex; justify-content: space-between; align-items: center; }
        .room-title { font-weight: 700; font-size: 18px; letter-spacing: -0.5px; }
        
        .arrow { transition: transform 0.4s ease; color: var(--secondary); }

        .empty-toggle { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--danger); font-weight: 600; }
        .empty-toggle input { width: 22px; height: 22px; accent-color: var(--danger); }

        .room-content { 
            max-height: 0; opacity: 0; transition: all 0.4s ease; padding: 0 20px; overflow: hidden;
        }
        .room-content.open { max-height: 600px; opacity: 1; padding: 10px 20px 20px 20px; border-top: 1px solid var(--glass-border); }

        .resident { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 0.5px solid var(--glass-border); }
        .resident:last-child { border-bottom: none; }

        /* Чекбоксы */
        input[type="checkbox"] { width: 28px; height: 28px; border-radius: 10px; accent-color: var(--accent); }

        /* Фикс нижней панели (Safe Area) */
        .main-controls { 
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            /* Используем env для правильного отступа на безрамочных iPhone */
            padding: 15px 20px calc(15px + env(safe-area-inset-bottom)) 20px;
            border-top: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .btn-main { 
            width: 100%; background: var(--accent); color: white; padding: 18px; 
            border-radius: 20px; border: none; font-size: 17px; font-weight: 700; 
            box-shadow: 0 10px 20px rgba(0, 122, 255, 0.3);
            transition: transform 0.2s;
        }
        .btn-main:active { transform: scale(0.97); }

        /* Модалка отчета */
        #reportScreen {
            position: fixed; inset: 0; background: rgba(0,0,0,0.3); 
            backdrop-filter: blur(10px); z-index: 99999; 
            display: none; flex-direction: column; justify-content: flex-end;
        }
        .report-modal {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border-radius: 35px 35px 0 0; 
            padding: 30px 25px calc(30px + env(safe-area-inset-bottom)) 25px;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1.1);
        }
        #reportScreen.active .report-modal { transform: translateY(0); }

        .report-box { 
            font-size: 16px; background: rgba(255,255,255,0.05); 
            padding: 20px; border-radius: 20px; margin-bottom: 20px; 
            border: 1px solid var(--glass-border);
        }
        
        .copy-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .btn-copy { padding: 16px; border-radius: 16px; font-weight: 700; border: none; font-size: 14px; }
        .copy-blue { background: var(--accent); color: white; }
        .copy-outline { background: transparent; border: 2px solid var(--accent); color: var(--accent); }

        #mainContent { display: none; }
        
        h2 { font-size: 34px; font-weight: 800; letter-spacing: -1px; margin-bottom: 25px; }
    </style>
</head>
<body>

    <div id="authScreen">
        <div class="glass-panel" style="padding: 40px; text-align: center; width: 280px;">
            <h2 style="font-size: 24px;">🔐 Доступ</h2>
            <input type="password" id="pinInput" class="pin-input" style="width: 100%; font-size: 24px; background: none; border: 2px solid var(--accent); border-radius: 15px; padding: 10px; color: var(--text); text-align: center;" inputmode="numeric" maxlength="4">
            <button class="btn-main" style="margin-top: 20px;" onclick="checkPin()">Войти</button>
        </div>
    </div>

    <div id="mainContent">
        <h2>Численность</h2>
        <div id="app"></div>
        <div class="main-controls">
            <button class="btn-main" onclick="openReport()">Готово</button>
        </div>
    </div>

    <div id="reportScreen" onclick="if(event.target==this)closeReport()">
        <div class="report-modal">
            <div style="width: 40px; height: 5px; background: var(--secondary); border-radius: 5px; margin: -15px auto 20px auto; opacity: 0.5;"></div>
            <h3 style="text-align:center; margin-bottom: 20px;">Отчет готов</h3>
            <div id="reportOutput" class="report-box"></div>
            
            <div class="copy-row">
                <button class="btn-copy copy-blue" onclick="copyPart('main')">Итог</button>
                <button class="btn-copy copy-outline" onclick="copyPart('weekend')">Выходные</button>
            </div>
            <button class="btn-main" style="background: var(--bg); color: var(--text); box-shadow: none;" onclick="closeReport()">Закрыть</button>
            <button style="width: 100%; background: none; border: none; color: var(--danger); margin-top: 20px; font-weight: 600;" onclick="resetAll()">Сбросить всё</button>
        </div>
    </div>

<script>
    const SECRET_PIN = "9564";
    const data = [
        { room: "634", names: ["Лобачев Е.", "Фролов А.", "Беляев М.", "Дуляев А."] },
        { room: "633", names: ["Гусаков Д.", "Дергунов Я."] },
        { room: "632", names: ["Турсунов С.", "Погосян В."] },
        { room: "631", names: ["Гавриков С.", "Киргиз Н.", "Кисилёв Р.", "Тверянкин А."] },
        { room: "624", names: ["Муратов Н.", "Королёв М.", "Коржов С.", "Хохлов А."] },
        { room: "623", names: ["Бодягин В.", "Иванов Я."] },
        { room: "622", names: ["Обертас Д.", "Мартынов А."] },
        { room: "621", names: ["Меньшов М.", "Ивченков Е.", "Капусткин Р.", "Порочкин Д."] },
        { room: "614", names: ["Ненахов В.", "Распопов Т.", "Распоченюк В.", "Бурименко П."] },
        { room: "613", names: ["Лазарев Ф.", "Коптин С."] },
        { room: "612", names: ["Фомин С.", "Сычев Д."] },
        { room: "611", names: ["Скрябин С.", "Колесников И.", "Захариков Д.", "Поповкин А."] },
        { room: "600", names: ["Грязнов С.", "Андрианов Э."] }
    ];

    const storageKey = 'dorm_v_liquid';
    let savedData = JSON.parse(localStorage.getItem(storageKey)) || {};
    let lastMain = "", lastWeekend = "";

    if (localStorage.getItem('dorm_auth') === 'true') unlockApp();

    function checkPin() {
        if (document.getElementById('pinInput').value === SECRET_PIN) {
            localStorage.setItem('dorm_auth', 'true');
            unlockApp();
        } else alert('❌');
    }

    function unlockApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainContent').style.display = 'block';
        render();
    }

    function render() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        data.forEach(item => {
            const isEmpty = savedData[`empty_${item.room}`] || false;
            const roomDiv = document.createElement('div');
            roomDiv.className = `room-block glass-panel ${isEmpty ? 'empty-room' : ''}`;
            
            let resHtml = '';
            item.names.forEach(name => {
                const idP = `p_${item.room}_${name}`, idW = `w_${item.room}_${name}`;
                const isP = isEmpty ? false : (savedData[idP] !== undefined ? savedData[idP] : true);
                const isW = savedData[idW] || false;

                resHtml += `
                    <div class="resident">
                        <span class="res-name" style="${isEmpty ? 'opacity:0.5' : ''}">${name}</span>
                        <div class="check-group">
                            <label><input type="checkbox" onchange="save('${idP}', this.checked)" ${isP?'checked':''} ${isEmpty?'disabled':''}>🏠</label>
                            <label><input type="checkbox" onchange="save('${idW}', this.checked)" ${isW?'checked':''}>📅</label>
                        </div>
                    </div>`;
            });

            roomDiv.innerHTML = `
                <div class="room-header">
                    <div class="room-info" onclick="toggleRoom(this)">
                        <span class="room-title">Комната ${item.room}</span>
                        <span class="arrow">▼</span>
                    </div>
                    <label class="empty-toggle">
                        <span>Пусто</span>
                        <input type="checkbox" onchange="setEmpty('${item.room}', this.checked)" ${isEmpty?'checked':''}>
                    </label>
                </div>
                <div class="room-content">${resHtml}</div>`;
            app.appendChild(roomDiv);
        });
    }

    function toggleRoom(el) {
        const content = el.parentElement.nextElementSibling;
        const arrow = el.querySelector('.arrow');
        content.classList.toggle('open');
        arrow.style.transform = content.classList.contains('open') ? 'rotate(180deg)' : 'rotate(0deg)';
    }

    function setEmpty(room, val) {
        savedData[`empty_${room}`] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
        render();
    }

    function save(id, val) {
        savedData[id] = val;
        localStorage.setItem(storageKey, JSON.stringify(savedData));
    }

    function openReport() {
        let total = 0, absent = [], weekend = [];
        data.forEach(g => {
            if (savedData[`empty_${g.room}`]) {
                absent.push(`• В ${g.room} никого нет`);
            } else {
                let rAbs = [];
                g.names.forEach(n => {
                    if (savedData[`p_${g.room}_${n}`] !== false) total++;
                    else rAbs.push(n.split(' ')[0]);
                });
                if (rAbs.length) absent.push(`• ${rAbs.join(', ')} (${g.room})`);
            }
            g.names.forEach(n => {
                if (savedData[`w_${g.room}_${n}`]) weekend.push(`${n.split(' ')[0]} (${g.room})`);
            });
        });

        lastMain = `ИТОГ: ${total} чел.\n\nОТСУТСТВУЮТ:\n${absent.length ? absent.join('\n') : 'Все на месте'}`;
        lastWeekend = weekend.length ? `НА ВЫХОДНЫЕ:\n${weekend.join(', ')}` : "Никого нет";

        document.getElementById('reportOutput').innerText = lastMain + (weekend.length ? `\n\n${lastWeekend}` : "");
        const screen = document.getElementById('reportScreen');
        screen.style.display = 'flex';
        setTimeout(() => screen.classList.add('active'), 10);
    }

    function copyPart(type) {
        const text = (type === 'main') ? lastMain : lastWeekend;
        navigator.clipboard.writeText(text).then(() => {
            alert('Скопировано! ✅');
        });
    }

    function closeReport() {
        const screen = document.getElementById('reportScreen');
        screen.classList.remove('active');
        setTimeout(() => screen.style.display = 'none', 500);
    }

    function resetAll() {
        if (confirm("Сбросить данные?")) {
            localStorage.removeItem(storageKey);
            location.reload();
        }
    }
</script>
</body>
</html>
