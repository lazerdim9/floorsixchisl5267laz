<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dorm Ultra Smooth</title>
    <style>
        :root {
            --bg: #f2f2f7;
            --glass: rgba(255, 255, 255, 0.9);
            --border: rgba(0, 0, 0, 0.1);
            --accent: #007aff;
            --danger: #ff3b30;
            --text: #1c1c1e;
            --secondary: #8e8e93;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --glass: rgba(28, 28, 30, 0.95);
                --border: rgba(255, 255, 255, 0.15);
                --accent: #0a84ff;
                --danger: #ff453a;
                --text: #ffffff;
                --secondary: #98989d;
            }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: var(--bg); color: var(--text);
            margin: 0; padding: 20px 16px 120px 16px;
        }

        /* Убираем тени, оставляем четкие границы для скорости */
        .card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            margin-bottom: 12px;
            overflow: hidden;
            /* Включаем аппаратный слой */
            transform: translateZ(0); 
            will-change: contents;
        }

        .header {
            padding: 14px 18px;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer;
        }

        .title { font-weight: 600; font-size: 17px; }

        /* Контейнер анимации */
        .content-box {
            display: none; /* По умолчанию скрыто */
            padding: 0 18px 16px 18px;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .card.open .content-box {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .card.open { border-color: var(--accent); }

        /* Список людей */
        .row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0;
            border-bottom: 0.5px solid var(--border);
        }
        .row:last-child { border-bottom: none; }

        .name { font-size: 16px; font-weight: 400; }

        .checks { display: flex; gap: 15px; }
        .checks input { 
            width: 26px; height: 26px; 
            border-radius: 6px; 
            accent-color: var(--accent); 
        }

        /* Кнопка */
        .footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            background: var(--glass);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 100;
        }

        .btn {
            width: 100%; padding: 16px; border-radius: 14px;
            background: var(--accent); color: white;
            border: none; font-size: 17px; font-weight: 600;
        }
        .btn:active { opacity: 0.7; }

        /* Пин-код */
        #auth {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .auth-box { text-align: center; width: 80%; }
        .pin { 
            width: 100%; padding: 15px; font-size: 30px; text-align: center;
            border-radius: 15px; border: 2px solid var(--accent);
            background: var(--glass); color: var(--text); margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-box">
        <h2 style="margin-bottom:20px">Введите PIN</h2>
        <input type="password" id="p" class="pin" inputmode="numeric" maxlength="4" placeholder="••••">
        <button class="btn" onclick="login()">Войти</button>
    </div>
</div>

<div id="main" style="display:none">
    <h1 style="margin-left:5px; font-size:32px;">Этаж</h1>
    <div id="list"></div>
    <div class="footer">
        <button class="btn" onclick="alert('Отчет готов!')">Сформировать итог</button>
    </div>
</div>

<script>
    const rooms = [
        { r: "634", n: ["Лобачев Е.", "Фролов А.", "Беляев М.", "Дуляев А."] },
        { r: "633", n: ["Гусаков Д.", "Дергунов Я."] },
        { r: "632", n: ["Турсунов С.", "Погосян В."] },
        { r: "631", n: ["Гавриков С.", "Киргиз Н.", "Кисилёв Р.", "Тверянкин А."] },
        { r: "624", n: ["Муратов Н.", "Королёв М.", "Коржов С.", "Хохлов А."] },
        { r: "623", n: ["Бодягин В.", "Иванов Я."] },
        { r: "622", n: ["Обертас Д.", "Мартынов А."] },
        { r: "621", n: ["Меньшов М.", "Ивченков Е.", "Капусткин Р.", "Порочкин Д."] },
        { r: "614", n: ["Ненахов В.", "Распопов Т.", "Распоченюк В.", "Бурименко П."] },
        { r: "613", n: ["Лазарев Ф.", "Коптин С."] },
        { r: "612", n: ["Фомин С.", "Сычев Д."] },
        { r: "611", n: ["Скрябин С.", "Колесников И.", "Захариков Д.", "Поповкин А."] },
        { r: "600", n: ["Грязнов С.", "Андрианов Э."] }
    ];

    function login() {
        if(document.getElementById('p').value === "9564") {
            document.getElementById('auth').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            render();
        }
    }

    function render() {
        const container = document.getElementById('list');
        rooms.forEach(room => {
            const card = document.createElement('div');
            card.className = 'card';
            
            let rows = '';
            room.n.forEach(name => {
                rows += `
                <div class="row">
                    <span class="name">${name}</span>
                    <div class="checks">
                        <input type="checkbox" checked>
                        <input type="checkbox">
                    </div>
                </div>`;
            });

            card.innerHTML = `
                <div class="header" onclick="this.parentElement.classList.toggle('open')">
                    <span class="title">Комната ${room.r}</span>
                    <span style="font-size:12px; opacity:0.5">▼</span>
                </div>
                <div class="content-box">
                    ${rows}
                </div>
            `;
            container.appendChild(card);
        });
    }
</script>

</body>
</html>
